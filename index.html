<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$BULLCAT • Airdrop Claim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    .scanline { position: relative; }
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, rgba(248, 113, 113, 0.1), transparent);
      background-size: 100% 400%;
      animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 400%; } }
    .glow-red { text-shadow: 0 0 25px rgb(248 113 113); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-mono">

  <div class="max-w-lg mx-auto pt-12 px-6">
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 text-4xl font-black mb-2">
        <i class="fas fa-cat text-orange-500"></i>
        <span class="bg-gradient-to-r from-red-400 to-orange-500 bg-clip-text text-transparent">$BULLCAT</span>
      </div>
      <h1 class="text-5xl font-bold tracking-tighter glow-red">AIRDROP CLAIM</h1>
    </div>

    <div class="bg-zinc-900 border border-red-500/50 rounded-3xl p-8 scanline">
      <!-- Balance -->
      <div class="mb-8 p-6 bg-black/70 rounded-2xl border border-red-500/30 text-center">
        <p class="text-gray-400 text-sm mb-1">YOUR $BULLCAT BALANCE</p>
        <div class="flex justify-center items-baseline gap-2">
          <span id="tokenBalance" class="text-6xl font-bold">0.00</span>
          <span class="text-red-400 text-2xl">$BULLCAT</span>
        </div>
        <p id="walletAddress" class="text-xs text-gray-500 mt-4 font-mono"></p>
      </div>

      <!-- Amount -->
      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-3">AMOUNT TO CLAIM</label>
        <div class="relative">
          <input type="number" id="burnAmount" class="w-full bg-black border border-red-500/50 rounded-2xl px-6 py-5 text-3xl outline-none" placeholder="0.00" step="0.01"/>
          <button onclick="setMaxAmount()" class="absolute right-4 top-1/2 -translate-y-1/2 text-red-400 font-bold">MAX</button>
        </div>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="claimSelected()" class="bg-red-600 hover:bg-red-700 py-6 rounded-2xl font-bold text-lg">CLAIM SELECTED</button>
        <button onclick="claimAll()" class="bg-gradient-to-r from-red-700 to-red-600 hover:from-red-800 py-6 rounded-2xl font-bold text-lg border-2 border-red-400">🔥 CLAIM ALL</button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <button onclick="connectWallet()" id="connectBtn"
              class="px-10 py-5 bg-white text-black rounded-2xl font-bold text-lg hover:bg-gray-100 flex items-center gap-3 mx-auto">
        <i class="fas fa-wallet"></i>
        <span id="btnText">CONNECT PHANTOM WALLET</span>
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/@solana/web3.js@1.98.0/dist/web3.min.js"></script>
  <script>
    let connectedPublicKey = null;
    let provider = null;

    async function connectWallet() {
      const btn = document.getElementById("connectBtn");
      const btnText = document.getElementById("btnText");

      if (!window.solana) {
        alert("Phantom Wallet not detected!\n\nPlease install Phantom and refresh the page.");
        return;
      }

      try {
        btnText.innerHTML = "Connecting...";
        provider = window.solana;
        
        const resp = await provider.connect();   // This should trigger popup
        connectedPublicKey = resp.publicKey;

        document.getElementById("walletAddress").textContent = 
          connectedPublicKey.toString().slice(0, 8) + "..." + connectedPublicKey.toString().slice(-6);

        btn.disabled = true;
        btnText.innerHTML = `✅ CONNECTED`;

        alert("Wallet Connected Successfully!");
        
      } catch (error) {
        console.error(error);
        btnText.innerHTML = "CONNECT PHANTOM WALLET";
        alert("Connection cancelled or failed.");
      }
    }

    function setMaxAmount() {
      alert("Please connect wallet first");
    }
    function claimSelected() {
      if (!connectedPublicKey) return alert("Please connect Phantom wallet first!");
      alert("Claim Selected - Transaction would go here");
    }
    function claimAll() {
      if (!connectedPublicKey) return alert("Please connect Phantom wallet first!");
      alert("Claim All - Transaction would go here");
    }

    window.connectWallet = connectWallet;
    window.setMaxAmount = setMaxAmount;
    window.claimSelected = claimSelected;
    window.claimAll = claimAll;
  </script>
</body>
</html>
