<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$BULLCAT • Airdrop Claim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    .scanline { position: relative; }
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, rgba(248, 113, 113, 0.12), transparent);
      animation: scan 3s linear infinite;
    }
    @keyframes scan { from { background-position: 0 0; } to { background-position: 0 300%; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-mono">

  <div class="max-w-lg mx-auto pt-16 px-6">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold glow-red">$BULLCAT AIRDROP</h1>
      <p class="text-red-400 mt-2">Claim your tokens</p>
    </div>

    <div class="bg-zinc-900 border border-red-500/60 rounded-3xl p-8">
      <div id="status" class="text-center mb-6 text-green-400 font-bold hidden">Connected</div>

      <button onclick="connectWallet()" id="connectBtn"
              class="w-full py-6 bg-white text-black rounded-2xl font-bold text-xl flex items-center justify-center gap-3 hover:bg-gray-100 transition">
        <i class="fas fa-wallet"></i>
        <span id="btnText">CONNECT PHANTOM WALLET</span>
      </button>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      Click above to trigger wallet connection popup
    </p>
  </div>

  <script>
    let connectedPublicKey = null;

    async function connectWallet() {
      const btnText = document.getElementById("btnText");

      if (typeof window.solana === "undefined") {
        alert("Phantom Wallet is not installed or not enabled.\n\nPlease install Phantom and refresh.");
        return;
      }

      try {
        btnText.innerHTML = "Waiting for approval...";

        // This should force the popup + approval screen
        const response = await window.solana.connect({ 
          onlyIfTrusted: false 
        });

        connectedPublicKey = response.publicKey.toString();

        document.getElementById("status").classList.remove("hidden");
        document.getElementById("status").innerHTML = `✅ Connected<br><small>${connectedPublicKey.slice(0,8)}...${connectedPublicKey.slice(-6)}</small>`;

        btnText.innerHTML = "✅ WALLET CONNECTED";
        document.getElementById("connectBtn").disabled = true;

        alert("Wallet successfully connected!\n\nYou can now use Claim Selected / Claim All.");

      } catch (error) {
        btnText.innerHTML = "CONNECT PHANTOM WALLET";
        if (error.code === 4001) {
          alert("Connection request was cancelled.");
        } else {
          console.error(error);
          alert("Failed to connect. Make sure Phantom is unlocked.");
        }
      }
    }

    // Expose for buttons
    window.connectWallet = connectWallet;
  </script>
</body>
</html>
